var map = L.map('map').setView([50.8767, 6.164], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);
if (homeLat !== null && homeLon !== null) {
  // Radius-Ringe ZUERST (damit Marker darueber liegt)
  if (radius2M !== null) {
    L.circle([homeLat, homeLon], {
      radius: radius2M,
      color: '#ffc107', weight: 2, opacity: 0.6,
      fillColor: '#ffc107', fillOpacity: 0.04,
      interactive: false
    }).addTo(map).bindTooltip('30 km (Warnradius)', {permanent:false});
  }
  if (radiusM !== null) {
    L.circle([homeLat, homeLon], {
      radius: radiusM,
      color: '#00d68f', weight: 2, opacity: 0.7,
      fillColor: '#00d68f', fillOpacity: 0.06,
      interactive: false
    }).addTo(map).bindTooltip('15 km (Trefferradius)', {permanent:false});
  }
  L.marker([homeLat, homeLon], {
    icon: L.divIcon({
      html: '<div class="home-marker">&#127968;</div>',
      className: '',
      iconSize: [36, 36],
      iconAnchor: [18, 18]
    }),
    zIndexOffset: 1000
  }).addTo(map).bindPopup('<b>Heimatadresse</b>').openPopup();
}
markers.forEach(function(m) {
  var titleCls = m.dismissed ? 'popup-title popup-dismissed' : 'popup-title';
  var popup = '<div class="' + titleCls + '">' + m.title
            + (m.dismissed ? ' <span class="dismissed-hint">(aussortiert)</span>' : '')
            + '</div>'
            + '<div class="popup-company">' + m.company + '</div>'
            + '<div class="popup-loc">' + m.location + ' &middot; ' + m.source + '</div>'
            + '<a href="' + m.url + '" target="_blank">Stellenanzeige &rarr;</a>';
  L.marker([m.lat, m.lon], {opacity: m.dismissed ? 0.4 : 1.0}).addTo(map).bindPopup(popup);
});
</script>
</body>
</html>
